<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse String</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #e94560;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input[type="text"]:focus {
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #c23152);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .result-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        #result {
            color: #4ecca3;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
            word-break: break-all;
            text-align: center;
            transition: all 0.3s ease;
        }

        .result-container.has-result {
            border-color: rgba(78, 204, 163, 0.3);
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.1);
        }

        .error {
            color: #e94560 !important;
            font-size: 0.9rem !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reverse String</h1>
        <p class="subtitle">Invierte el orden de tu cadena de texto</p>

        <div class="input-group">
            <label for="inputText">Texto original</label>
            <input 
                type="text" 
                id="inputText" 
                placeholder="Escribe aquí... ej: AI4Devs"
                autocomplete="off"
            />
        </div>

        <button id="reverseBtn" onclick="handleReverse()">
            ⇄ Invertir cadena
        </button>

        <div class="result-container" id="resultContainer">
            <span class="result-label">Resultado</span>
            <span id="result">—</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
